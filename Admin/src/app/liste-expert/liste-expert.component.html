<div class="wrapper">
  <app-menu></app-menu>
  <app-header></app-header>

  <div id="content-page" class="content-page">
    <div class="container-fluid">
      <div class="iq-card">
        <div class="iq-card-header d-flex justify-content-between align-items-center">
              <div class="iq-header-title">
                <h4 class="card-title">Liste des Experts Agricoles</h4>
              </div>
              <a
                routerLink="/ajouterExpert"
                class="btn btn-primary">
                Ajouter
              </a>
            </div>

        <div class="iq-card-body">
          <table class="table table-striped">
            <thead>
              <tr>
                <th>Nom</th>
                <th>Prénom</th>
                <th>Email</th>
                <th>Adresse</th>
                <th>Téléphone</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let expert of listeExperts | paginate:{itemsPerPage:10,currentPage:p}">
                <td>{{ expert.nom }}</td>
                <td>{{ expert.prenom }}</td>
                <td>{{ expert.email }}</td>
                <td>{{ expert.adresse }}</td>
                <td>{{ expert.tlf }}</td>
                <td>
                  <a class="btn btn-success btn-sm" 
                    href="/modifierExpert/{{expert.id}}">
                      Modifier
                    </a>
                  <button class="btn btn-danger btn-sm"
                      (click)="deleteExpert(expert)">
                    Supprimer
                  </button>
                  <button *ngIf="!expert.etat" class="btn btn-sm btn-light btn-3d" (click)="updateExpertEtat(expert)">
                    <i class="fa-solid fa-lock" style="color: black;"></i>
                  </button>
                  <button *ngIf="expert.etat" class="btn btn-sm btn-secondary btn-3d" (click)="updateExpertEtat(expert)">
                    <i class="fa-solid fa-check" style="color: green;"></i>      
                  </button>
                </td>
              </tr>
            </tbody>
          </table>
          <pagination-controls style="text-align: right;" (pageChange)="p = $event"></pagination-controls>

        </div>
      </div>
    </div>
  </div>
  <app-footer></app-footer>
</div>
