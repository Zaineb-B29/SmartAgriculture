<div class="wrapper">

  <app-menu></app-menu>
  <app-header></app-header>

  <div id="content-page" class="content-page">
    <div class="container-fluid">

      <div class="row content-body">
        <div class="col-lg-12 row m-0 p-0">

          <!-- ADMIN -->
          <div class="col-sm-6 col-md-6 col-lg-3">
            <div class="iq-card iq-card-block iq-card-stretch iq-card-height clickable-card"
                 routerLink="/listeAdmin">

              <div class="iq-card-body">
                <div class="icon iq-icon-box rounded" style="background:#e3f2fd;">
                  <i class="ri-cpu-line" style="color:#1e88e5;"></i>
                </div>

                <div class="mt-4">
                  <h5 class="text-uppercase" style="color:#1e88e5;">Administrateur</h5>
                  <h3 class="d-flex" style="color:#1e88e5;">
                    {{totalAdmin}} <i class="ri-arrow-up-line"></i>
                  </h3>
                </div>

                <div class="mt-3">
                  <div class="iq-progress-bar">
                    <span style="background:#1e88e5;"></span>
                  </div>
                </div>
              </div>

            </div>
          </div>

          <!-- CLIENT -->
          <div class="col-sm-6 col-md-6 col-lg-3">
            <div class="iq-card iq-card-block iq-card-stretch iq-card-height clickable-card"
                 routerLink="/listeClient">

              <div class="iq-card-body">
                <div class="icon iq-icon-box rounded" style="background:#e8f5e9;">
                  <i class="ri-window-line" style="color:#2e7d32;"></i>
                </div>

                <div class="mt-4">
                  <h5 class="text-uppercase" style="color:#2e7d32;">Client</h5>
                  <h3 class="d-flex" style="color:#2e7d32;">
                    {{totalClient}} <i class="ri-arrow-down-line"></i>
                  </h3>
                </div>

                <div class="mt-3">
                  <div class="iq-progress-bar">
                    <span style="background:#2e7d32;"></span>
                  </div>
                </div>
              </div>

            </div>
          </div>

          <!-- EXPERT -->
          <div class="col-sm-6 col-md-6 col-lg-3">
            <div class="iq-card iq-card-block iq-card-stretch iq-card-height clickable-card"
                 routerLink="/listeExpert">

              <div class="iq-card-body">
                <div class="icon iq-icon-box rounded" style="background:#fff3e0;">
                  <i class="ri-u-disk-line" style="color:#ffb300;"></i>
                </div>

                <div class="mt-4">
                  <h5 class="text-uppercase" style="color:#ffb300;">Expert Agricole</h5>
                  <h3 class="d-flex" style="color:#ffb300;">
                    {{totalExpert}} <i class="ri-arrow-up-line"></i>
                  </h3>
                </div>

                <div class="mt-3">
                  <div class="iq-progress-bar">
                    <span style="background:#ffb300;"></span>
                  </div>
                </div>
              </div>

            </div>
          </div>

          <!-- FOURNISSEUR -->
          <div class="col-sm-6 col-md-6 col-lg-3">
            <div class="iq-card iq-card-block iq-card-stretch iq-card-height clickable-card"
                 routerLink="/listeFournisseur">

              <div class="iq-card-body">
                <div class="icon iq-icon-box rounded" style="background:#f3e5f5;">
                  <i class="ri-global-line" style="color:#7b1fa2;"></i>
                </div>

                <div class="mt-4">
                  <h5 class="text-uppercase" style="color:#7b1fa2;">Fournisseur</h5>
                  <h3 class="d-flex" style="color:#7b1fa2;">
                    {{totalFournisseur}} <i class="ri-arrow-down-line"></i>
                  </h3>
                </div>

                <div class="mt-3">
                  <div class="iq-progress-bar">
                    <span style="background:#7b1fa2;"></span>
                  </div>
                </div>
              </div>

            </div>
          </div>

        </div>
      </div>

    </div>

    <!-- CHART -->
    <div class="row">
      <div class="col-md-12">
        <div class="charts-wrapper">
          <div class="chart-container">
            <canvas id="percentageCanvas" width="350" height="350"></canvas>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<app-footer></app-footer>
