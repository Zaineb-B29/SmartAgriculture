<!doctype html>
<html lang="en">
   
<!-- Mirrored from templates.iqonic.design/server360/html-dark/sign-in.html by HTTrack Website Copier/3.x [XR&CO'2014], Wed, 28 Jan 2026 10:39:21 GMT -->
<head>
      <!-- Required meta tags -->
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
      <title>Smart Agriculture</title>
      <!-- Favicon -->
      
   </head>
   <body>
      <!-- loader Start -->
      <div id="loading">
         <div id="loading-center">
         </div>
      </div>
      <!-- loader END -->
        <!-- Sign in Start -->
        <section class="sign-in-page">
          <div class="container p-0" id="sign-in-page-box">
                <div class="bg-white form-container sign-up-container">
                   <div class="sign-in-page-data">
                      <div class="sign-in-from w-100 m-auto">
                          <h1 class="mb-3 text-center">Login</h1>
                          <p class="text-center text-dark">Enter your email address and password to access admin panel.</p>
                          <form class="mt-4" [formGroup]="loginForm" (ngSubmit)="login()">
                              <div class="form-group">
                                  <label formControlName="email">Email</label>
                                  <input type="email" class="form-control mb-0" id="exampleInputEmail1" placeholder="Entrer e-mail" formControlName="email">
                              </div>
                              <div class="form-group">
                                  <label formControlName="mdp">Mot de passe</label>
                                  <input type="password" class="form-control mb-0" id="exampleInputEmail2" placeholder="Entrer mot de passe" formControlName="mdp">
                              </div>
                          </form>
                      </div>
                  </div>
                </div>
                <div class="bg-white form-container sign-in-container">
                    <div class="sign-in-page-data">
                      <div class="sign-in-from w-100 m-auto">
                          <h1 class="mb-3 text-center">Sign in</h1>
                          <p class="text-center text-dark">Enter your email address and password to access admin panel.</p>
                          <form class="mt-4" [formGroup]="loginForm" (ngSubmit)="login()">
                            <div class="form-group">
                                <label for="email">Email</label>
                                <input 
                                    type="email"
                                    class="form-control"
                                    id="email"
                                    placeholder="Entrer e-mail"
                                    formControlName="email">
                            </div>
                            <div class="form-group">
                                <label for="mdp">Mot de passe</label>
                                <input 
                                    type="password"
                                    class="form-control"
                                    id="mdp"
                                    placeholder="Entrer mot de passe"
                                    formControlName="mdp">
                            </div>

                            <button type="submit" class="btn btn-primary w-100 mt-3">
                                Sign In
                            </button>
                            </form>
                      </div>
                  </div>
                </div>
                <div class="overlay-container" >
                    <div class="overlay">
                        <div class="overlay-panel overlay-left">
                            <a class="sign-in-logo mb-5" href="#"><img src="assets/images/logologin.png" class="img-fluid" alt="logo"></a>
                            <p>To Keep connected with us please login with your personal info</p>
                            <button class="btn iq-border-primary mt-2" id="signIn">Sign In</button>
                        </div>
                        <div class="overlay-panel overlay-right">
                            <a class="sign-in-logo mb-5" href="#"><img src="assets/images/logologin.png" class="img-fluid" alt="logo"></a>
                            <p>Enter your personal details and start journey with us</p>
                            <button class="btn iq-border-primary mt-2" id="signUp">Sign Up</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        <!-- Sign in END -->
        
   </body>
</html>
