<div class="wrapper">

  <!-- Sidebar -->
  <app-menu></app-menu>

  <!-- Header -->
  <app-header></app-header>

  <!-- Page Content -->
  <div id="content-page" class="content-page">
    <div class="container-fluid">
      <div class="row">
        <div class="col-sm-12 col-lg-12">


<div class="container bootstrap snippets bootdeys">
<div class="row">
  <div class="col-xs-12 col-sm-9">
    <form class="form-horizontal" (ngSubmit)="updateadmin()" [formGroup]="updateadminForm">
        <div class="panel panel-default">
            <div class="panel-heading">
            <h4 class="panel-title">User info</h4>
        </div>
        <div class="panel-body">
          
          <div class="form-group">
            <label class="col-sm-2 control-label">Nom</label>
            <div class="col-sm-10">
              <input type="text" class="form-control">
            </div>
            <label class="col-sm-2 control-label">prénom</label>
            <div class="col-sm-10">
              <input type="text" class="form-control" formControlName="prenom">
            </div>
            <label class="col-sm-2 control-label">Email</label>
            <div class="col-sm-10">
              <input type="email" class="form-control" formControlName="email">
            </div>
          </div>
          <div class="col-md-6 mb-3">
            <label for="validationDefault04">Role</label>
                <select [disabled]="!isSuperAdmin" formControlName="role" class="form-control" id="validationDefault04" required>
                    <option selected disabled value="">Choisir...</option>
                    <option value="superadmin">super admin</option>
                    <option value="sousadmin">sous admin</option>
                </select>
                <small *ngIf="!isSuperAdmin" class="text-danger">
                Vous n'avez pas le droit de modifier le rôle
    </small>
            </div>
        </div>
      </div>

      <div class="panel panel-default">
        <div class="panel-heading">
        <h4 class="panel-title">Security</h4>
        </div>
        <div class="panel-body">
          <div class="form-group">
            <label class="col-sm-2 control-label">Current password</label>
            <div class="col-sm-10">
              <input type="password" class="form-control">
            </div>
          </div>
          <div class="form-group">
            <label class="col-sm-2 control-label">New password</label>
            <div class="col-sm-10">
              <input type="password" class="form-control">
            </div>
          </div>
          <div class="form-group">
            <div class="col-sm-10 col-sm-offset-2">
              <div class="checkbox">
                <input type="checkbox" id="checkbox_1">
                <label for="checkbox_1">Make this account public</label>
              </div>
            </div>
          </div>
          <div class="form-group">
            <div class="col-sm-10 col-sm-offset-2">
                <button class="btn btn-success" type="submit">Modifier</button>
              <button type="reset" class="btn btn-default">Cancel</button>
            </div>
          </div>
        </div>
      </div>
    </form>
  </div>
</div>
</div>


        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <app-footer></app-footer>

</div>
