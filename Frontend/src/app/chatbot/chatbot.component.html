<div class="chatbot-wrapper">

  <!-- ── Chat Panel ── -->
  <div class="chat-panel" [class.visible]="isOpen">

    <!-- Header -->
    <div class="chat-header">
      <div class="bot-avatar" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a3 3 0 0 1 3 3v1a3 3 0 0 1-3 3 3 3 0 0 1-3-3V5a3 3 0 0 1 3-3z"/>
          <path d="M12 9v3"/>
          <path d="M6.5 14.5A6 6 0 0 1 12 12a6 6 0 0 1 5.5 2.5"/>
          <path d="M3 20a9 9 0 0 1 18 0"/>
        </svg>
      </div>

      <div class="header-info">
        <span class="bot-name">AgroSmart AI</span>
        <div class="bot-status">
          <span class="status-dot" aria-hidden="true"></span>
          En ligne
        </div>
      </div>

      <button class="header-btn" (click)="clearChat()" title="Effacer la conversation" aria-label="Effacer la conversation">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14H6L5 6"/>
          <path d="M10 11v6M14 11v6"/>
        </svg>
      </button>

      <button class="header-btn" (click)="toggleChat()" title="Fermer" aria-label="Fermer le chat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <!-- Messages -->
    <div class="chat-messages" #messagesContainer>
      <div
        class="message-row"
        *ngFor="let msg of messages"
        [class.user-row]="msg.sender === 'user'"
        [class.bot-row]="msg.sender === 'bot'"
      >
        <div class="msg-avatar" aria-hidden="true">
          <!-- Bot icon -->
          <svg *ngIf="msg.sender === 'bot'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a3 3 0 0 1 3 3v1a3 3 0 0 1-3 3 3 3 0 0 1-3-3V5a3 3 0 0 1 3-3z"/>
            <path d="M3 20a9 9 0 0 1 18 0"/>
          </svg>
          <!-- User icon -->
          <svg *ngIf="msg.sender === 'user'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </div>

        <div
          class="message-bubble"
          [class.bot-bubble]="msg.sender === 'bot'"
          [class.user-bubble]="msg.sender === 'user'"
        >
          <!-- Typing indicator -->
          <div class="typing-dots" *ngIf="msg.isLoading" aria-label="En train d'écrire">
            <span></span><span></span><span></span>
          </div>

          <!-- Message text -->
          <span class="msg-text" *ngIf="!msg.isLoading">{{ msg.text }}</span>

          <!-- Timestamp -->
          <span class="msg-time" *ngIf="!msg.isLoading">{{ formatTime(msg.timestamp) }}</span>
        </div>
      </div>
    </div>

    <!-- Quick Action Chips -->
    <div class="quick-actions" aria-label="Questions rapides">
      <button class="quick-btn" (click)="sendQuick('Maladies des plantes')">🌿 Maladies</button>
      <button class="quick-btn" (click)="sendQuick('Conseils irrigation')">💧 Irrigation</button>
      <button class="quick-btn" (click)="sendQuick('Mes besoins agricoles')">📋 Mes besoins</button>
      <button class="quick-btn" (click)="sendQuick('Recommandations engrais')">🌱 Engrais</button>
    </div>

    <!-- Input -->
    <div class="chat-input-area">
      <textarea
        class="chat-input"
        [(ngModel)]="userInput"
        (keydown)="onKeydown($event)"
        (input)="autoResize($event)"
        [disabled]="loading"
        placeholder="Posez votre question..."
        rows="1"
        aria-label="Message"
      ></textarea>

      <button
        class="send-btn"
        (click)="sendMessage()"
        [disabled]="loading || !userInput.trim()"
        aria-label="Envoyer"
      >
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>

    <div class="chat-footer">AgroSmart AI &mdash; Propulsé par Gemini</div>
  </div>

  <!-- ── FAB Toggle Button ── -->
  <button
    class="chat-bubble-btn"
    [class.open]="isOpen"
    (click)="toggleChat()"
    [attr.aria-label]="isOpen ? 'Fermer le chat' : 'Ouvrir le chat'"
    aria-haspopup="dialog"
  >
    <!-- Open icon: leaf -->
    <svg *ngIf="!isOpen" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10z"/>
      <path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/>
    </svg>
    <!-- Close icon: X -->
    <svg *ngIf="isOpen" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="18" y1="6" x2="6" y2="18"/>
      <line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
  </button>

</div>
